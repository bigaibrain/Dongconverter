<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Dong→USD">
<meta name="theme-color" content="#0a66c2">
<title>Dong → USD</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, system-ui, sans-serif;
    margin: 0; padding: 16px; color: #1a1a1a; background: #fff;
    max-width: 560px; margin: 0 auto;
  }
  h1 { font-size: 22px; font-weight: 700; margin: 0 0 4px; }
  .sub { color: #666; font-size: 13px; margin: 0 0 16px; }
  .card { border-radius: 10px; padding: 14px; margin-bottom: 16px; }
  .rate { background: #f4f4f5; }
  .custom { background: #eef6ff; }
  label { font-size: 13px; font-weight: 600; display: block; margin-bottom: 6px; }
  input {
    width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc;
    font-size: 18px; outline: none;
  }
  .custom input { border-color: #9cc3f0; }
  .result { margin-top: 12px; font-size: 15px; }
  .result b { font-weight: 700; font-size: 24px; color: #0a66c2; }
  h2 { font-size: 16px; font-weight: 600; margin: 0 0 8px; }
  .table { border: 1px solid #e4e4e7; border-radius: 10px; overflow: hidden; }
  .head, .row { display: flex; padding: 10px 14px; font-size: 14px; }
  .head { background: #f4f4f5; font-weight: 600; font-size: 13px; }
  .row { border-top: 1px solid #f0f0f0; }
  .row:nth-child(even) { background: #fafafa; }
  .col1 { flex: 1; }
  .col2 { width: 110px; text-align: right; font-variant-numeric: tabular-nums; }
  .scroll { max-height: 50vh; overflow-y: auto; }
  .note { color: #999; font-size: 12px; margin-top: 12px; }
</style>
</head>
<body>
  <h1>Dong → USD</h1>
  <p class="sub" id="sub"></p>

  <div class="card rate">
    <label for="rate">Exchange rate (₫ per $1)</label>
    <input type="number" id="rate" value="26308">
  </div>

  <div class="card custom">
    <label for="vnd">Enter dong amount</label>
    <input type="text" inputmode="numeric" id="vnd" placeholder="e.g. 250000">
    <div class="result" id="result">0 ₫ = <b>$0.00</b></div>
  </div>

  <h2>Quick reference (50,000 ₫ steps)</h2>
  <div class="table">
    <div class="head"><span class="col1">Vietnamese Dong</span><span class="col2">US Dollar</span></div>
    <div class="scroll" id="rows"></div>
  </div>
  <p class="note">Mid-market rate. ATMs and exchange counters add a markup, so expect a bit less in practice.</p>

<script>
  const rateEl = document.getElementById('rate');
  const vndEl = document.getElementById('vnd');
  const resultEl = document.getElementById('result');
  const rowsEl = document.getElementById('rows');
  document.getElementById('sub').textContent = 'Rate editable below. Tap to adjust if the market moves.';

  const fmtUsd = v => v.toLocaleString('en-US', {style:'currency', currency:'USD'});
  const fmtVnd = v => v.toLocaleString('en-US') + ' ₫';

  function rate() { return parseFloat(rateEl.value) || 0; }
  function usdPerVnd() { return rate() > 0 ? 1 / rate() : 0; }

  function renderCustom() {
    const v = parseFloat((vndEl.value || '').replace(/[, ]/g,'')) || 0;
    resultEl.innerHTML = fmtVnd(v) + ' = <b>' + fmtUsd(v * usdPerVnd()) + '</b>';
  }

  function renderTable() {
    let html = '';
    const r = usdPerVnd();
    for (let v = 50000; v <= 5000000; v += 50000) {
      html += '<div class="row"><span class="col1">' + fmtVnd(v) +
              '</span><span class="col2">' + fmtUsd(v * r) + '</span></div>';
    }
    rowsEl.innerHTML = html;
  }

  rateEl.addEventListener('input', () => { renderCustom(); renderTable(); });
  vndEl.addEventListener('input', renderCustom);
  renderCustom();
  renderTable();
</script>
</body>
</html>
